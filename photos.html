    <nav class="navbar">

        <div class="nav-right">

                <i class="fa-solid fa-envelope"></i>

            <a href="https://www.linkedin.com/in/annatamlin" target="_blank" rel="noopener" aria-label="LinkedIn Profile">

    <main class="scrapbook-container">
        <div class="camera-console">
            <img src="assets/cybershotframe.png" class="camera-body-hardware" alt="Sony Cybershot Frame">
            <div class="camera-screen-window">
                <div class="viewfinder-ui top-ui">
                    <span><i class="fa-solid fa-battery-half"></i> 60%</span>
                </div>
                <!-- Active image -->
                <img src="assets/plainsofabraham.jpg" id="active-screen-photo" alt="Plains of Abraham image">
            </div>
            <!-- Ineractive buttons -->
            <button class="cam-btn btn-prev" onclick="changePhoto(-1)" title="Previous Image"></button>
            <button class="cam-btn btn-next" onclick="changePhoto(1)" title="Next Image"></button>
        </div>
        <div class="exif-data-tag" id="photo-metadata">
            SONY CYBERSHOT DSC-W310 | FLYING OVER MOUNT FUJI, JAPAN | ISO 200 | f/5.6 | January 2026
        </div>
    </main>

    <script src="gallery.js"></script>
