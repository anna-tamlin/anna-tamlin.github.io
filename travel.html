    <script>
        const items = document.querySelectorAll('.travel-item');
        let highestZIndex = 10;

        items.forEach(item => {
            let isDragging = false;
            let startX, startY, initialLeft, initialTop;

            item.addEventListener('mousedown', (e) => {
                if (e.target.closest('.travel-card-back') || e.target.tagName === 'A') return;

                isDragging = true;
                highestZIndex++;
                item.style.zIndex = highestZIndex;
                item.classList.add('is-dragging');

                startX = e.clientX;
                startY = e.clientY;
                
                const rect = item.getBoundingClientRect();
                const parentRect = item.parentElement.getBoundingClientRect();
                
                initialLeft = rect.left - parentRect.left;
                initialTop = rect.top - parentRect.top;

                e.preventDefault(); 
            });

            document.addEventListener('mousemove', (e) => {
                if (!isDragging) return;

                const deltaX = e.clientX - startX;
                const deltaY = e.clientY - startY;

                item.style.left = `${initialLeft + deltaX}px`;
                item.style.top = `${initialTop + deltaY}px`;
            });

            document.addEventListener('mouseup', () => {
                if (isDragging) {
                    isDragging = false;
                    item.classList.remove('is-dragging');
                }
            });
        });
    </script>
